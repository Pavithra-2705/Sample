<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nebula Couture</title>
	
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #ffffff;
      color: #333;
    }
    header {
      background-color: #0b0c10;
      color: #66fcf1;
      padding: 20px;
      text-align: center;
      font-size: 2em;
      font-weight: bold;
      text-shadow: 2px 2px 5px #000;
    }
    nav {
      display: flex;
      justify-content: center;
      background-color: #f4f4f4;
      padding: 10px;
    }
    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
      text-shadow: 1px 1px 3px #aaa;
    }
    .hero {
      background: url('https://via.placeholder.com/1200x400') no-repeat center center/cover;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2.5em;
      font-weight: bold;
      text-shadow: 3px 3px 8px #000;
    }
    .products {
      display: flex;
      justify-content: space-around;
      padding: 40px;
    }
    .product {
      width: 250px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      border-radius: 10px;
      transition: transform 0.3s;
    }
    .product:hover {
      transform: scale(1.05);
    }
    .product img {
      width: 100%;
      border-radius: 10px;
    }
    footer {
      background-color: #0b0c10;
      color: #66fcf1;
      text-align: center;
      padding: 15px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <header>Nebula Couture</header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Women</a>
    <a href="#">Men</a>
    <a href="#">Accessories</a>
    <a href="#">Contact</a>
  </nav>

  <div class="hero">
	Elegance in every stitch, Power in every thread 
    
  </div>

  <section class="products">
    <div class="product">
      <img src=st.jpg alt="Dress">
      <h3>Trendy Crop Tops</h3>
      <p>₹799</p>
    </div>
    <div class="product">
      <img src=m.jpg alt="Suit">
      <h3>Men's Shirt</h3>
      <p>₹999</p>
    </div>
    <div class="product">
      <img src=kt.jpg alt="Bag">
      <h3>Ethnic Wear</h3>
      <p>₹1,399</p>
    </div>
     <div class="product">
      <img src=et.jpg alt="Bag">
      <h3>Festive Traditional Wear</h3>
      <p>₹7,199</p>
    </div>
  </section>

  <footer>
    © 2026 Nebula Couture — All Rights Reserved
  </footer>

</body>
</html>
